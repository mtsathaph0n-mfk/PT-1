
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GO Universe</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#24459b;
    --stock:#ff9800;
    --assets:#00c853;
    --task:#9800ff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#24459b22 0%,transparent 35%),
    radial-gradient(circle at bottom right,#4f73d822 0%,transparent 35%),
    #080b14;

    color:#fff;
    overflow:hidden;
}

/* Aurora */

body::before{
    content:'';
    position:fixed;

    width:700px;
    height:700px;

    border-radius:50%;

    background:#24459b;

    filter:blur(180px);

    top:-250px;
    left:-250px;

    opacity:.18;

    pointer-events:none;
}

body::after{
    content:'';
    position:fixed;

    width:500px;
    height:500px;

    border-radius:50%;

    background:#4f73d8;

    filter:blur(180px);

    bottom:-200px;
    right:-150px;

    opacity:.10;

    pointer-events:none;
}

/* Layout */

.container{
    width:100%;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:40px;
}

/* Logo */

.logo{
    text-align:center;
    margin-bottom:80px;
}

.logo h1{
    font-size:clamp(4rem,8vw,7rem);
    font-weight:800;
    line-height:1;
    letter-spacing:-4px;
}

.logo h2{
    font-size:1rem;
    font-weight:400;
    color:#94a3b8;
    margin-top:10px;
    letter-spacing:4px;
    text-transform:uppercase;
}

/* Color Line */

.universe-line{
    width:220px;
    height:5px;

    display:flex;

    margin:25px auto 0;

    border-radius:50px;
    overflow:hidden;
}

.universe-line span{
    transition:.5s;
}

.stock{
    flex:1;
    background:var(--stock);
}

.assets{
    flex:1;
    background:var(--assets);
}

.task{
    flex:1;
    background:var(--task);
}

.logo:hover .stock{
    flex:1.4;
}

.logo:hover .assets{
    flex:1.2;
}

.logo:hover .task{
    flex:1.5;
}

/* Cards */

.cards{

    width:100%;
    max-width:1100px;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(260px,1fr));

    gap:25px;
}

.card{

    text-decoration:none;
    color:white;

    padding:45px 35px;

    border-radius:28px;

    background:
    rgba(255,255,255,.04);

    backdrop-filter:blur(30px);

    border:1px solid rgba(255,255,255,.08);

    transition:.35s;

    position:relative;
    overflow:hidden;

    animation:float 8s ease-in-out infinite;
}

.card:nth-child(2){
    animation-delay:1s;
}

.card:nth-child(3){
    animation-delay:2s;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}

.card:hover{
    transform:translateY(-12px);
}

.card::before{
    content:'';
    position:absolute;

    width:220px;
    height:220px;

    border-radius:50%;

    top:-120px;
    right:-120px;

    background:rgba(255,255,255,.04);
}

/* Icons */

.icon{
    font-size:3rem;
    margin-bottom:30px;
}

.card h3{
    font-size:1.8rem;
    margin-bottom:8px;
}

.card p{
    color:#94a3b8;
    font-size:.95rem;
}

/* Individual Colors */

.stock-card{
    border-top:4px solid var(--stock);
}

.stock-card:hover{
    box-shadow:
    0 0 60px rgba(255,152,0,.35);
}

.assets-card{
    border-top:4px solid var(--assets);
}

.assets-card:hover{
    box-shadow:
    0 0 60px rgba(0,200,83,.35);
}

.task-card{
    border-top:4px solid var(--task);
}

.task-card:hover{
    box-shadow:
    0 0 60px rgba(152,0,255,.35);
}

/* Footer */

.footer{
    margin-top:70px;
    color:#64748b;
    font-size:.85rem;
    letter-spacing:2px;
    text-transform:uppercase;
}

/* Mobile */

@media(max-width:768px){

    body{
        overflow:auto;
    }

    .logo{
        margin-bottom:50px;
    }

    .cards{
        gap:20px;
    }

    .card{
        padding:35px 25px;
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="logo">

        <h1>GO</h1>

        <h2>Universe</h2>

        <div class="universe-line">
            <span class="stock"></span>
            <span class="assets"></span>
            <span class="task"></span>
        </div>

    </div>

    <div class="cards">

        <a href="gostock/" class="card stock-card">

            <div class="icon">📦</div>

            <h3>GOSTOCK</h3>

            <p>Inventory</p>

        </a>

        <a href="goassets/" class="card assets-card">

            <div class="icon">🏢</div>

            <h3>GOASSETS</h3>

            <p>Assets</p>

        </a>

        <a href="gotask/" class="card task-card">

            <div class="icon">✓</div>

            <h3>GOTASK</h3>

            <p>Projects</p>

        </a>

    </div>

    <div class="footer">
        One Login • One Database • One Ecosystem
    </div>

</div>

</body>
</html>
```
